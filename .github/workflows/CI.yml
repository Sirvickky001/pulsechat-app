name: PulseChat CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sirvickky001/pulsechat

jobs:
  # ─────────────────────────────────────────────
  # Detect which services actually change
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ws-gateway: ${{ steps.filter.outputs.ws-gateway }}
      presence: ${{ steps.filter.outputs.presence }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            ws-gateway:
              - 'services/ws-gateway/**'
            presence:
              - 'services/presence/**'

  # ─────────────────────────────────────────────
  # Test + build + push: api
  # ─────────────────────────────────────────────
  api:
    name: API service
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Install + test
        working-directory: services/api
        run: |
          npm ci
          npm run test:ci

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-api:sha-${{ steps.sha.outputs.short }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-api:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}-api:latest

      - name: Update config repo
        uses: ./.github/actions/update-config
        with:
          service: api
          short-sha: ${{ steps.sha.outputs.short }}
          config-repo-pat: ${{ secrets.CONFIG_REPO_PAT }}

  # ─────────────────────────────────────────────
  # Test + build + push: ws-gateway
  # ─────────────────────────────────────────────
  ws-gateway:
    name: WS gateway service
    needs: detect-changes
    if: needs.detect-changes.outputs.ws-gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ws-gateway/package-lock.json

      - name: Install + test
        working-directory: services/ws-gateway
        run: |
          npm ci
          npm run test:ci

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/ws-gateway
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-ws-gateway:sha-${{ steps.sha.outputs.short }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-ws-gateway:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: services/ws-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ws-gateway:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}-ws-gateway:latest

      - name: Update config repo
        uses: ./.github/actions/update-config
        with:
          service: ws-gateway
          short-sha: ${{ steps.sha.outputs.short }}
          config-repo-pat: ${{ secrets.CONFIG_REPO_PAT }}

  # ─────────────────────────────────────────────
  # Test + build + push: presence
  # ─────────────────────────────────────────────
  presence:
    name: Presence service
    needs: detect-changes
    if: needs.detect-changes.outputs.presence == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/presence/package-lock.json

      - name: Install + test
        working-directory: services/presence
        run: |
          npm ci
          npm run test:ci

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/presence
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-presence:sha-${{ steps.sha.outputs.short }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-presence:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: services/presence
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-presence:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}-presence:latest

      - name: Update config repo
        uses: ./.github/actions/update-config
        with:
          service: presence
          short-sha: ${{ steps.sha.outputs.short }}
          config-repo-pat: ${{ secrets.CONFIG_REPO_PAT }}
