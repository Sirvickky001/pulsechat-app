services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulsechat
      POSTGRES_PASSWORD: pulsechat
      POSTGRES_DB: pulsechat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsechat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: pulsechat
      PGPASSWORD: pulsechat
      PGDATABASE: pulsechat
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ws-gateway:
    build:
      context: ./services/ws-gateway
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      API_URL: http://api:4000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  presence:
    build:
      context: ./services/presence
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - api
      - ws-gateway
      - presence
    restart: unless-stopped

volumes:
  pgdata:
