<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseChat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3349;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --accent: #6c63ff;
      --accent-hover: #7c74ff;
      --green: #3ecf8e;
      --red: #ef4444;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Auth screen ── */
    #auth-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-box {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .auth-logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .auth-logo-text { font-size: 19px; font-weight: 600; }
    .auth-logo-text span { color: var(--accent); }

    .auth-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
    }
    .auth-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 14px;
    }
    input:focus { border-color: var(--accent); }

    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .auth-btn:hover { background: var(--accent-hover); }
    .auth-error { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 16px; }

    /* ── Main chat layout ── */
    #chat-screen { display: none; height: 100vh; }
    .layout { display: flex; height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }
    .me-badge { font-size: 11px; color: var(--muted); }

    .room-list { flex: 1; overflow-y: auto; padding: 8px; }
    .room-item {
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .room-item:hover { background: var(--surface2); }
    .room-item.active { background: var(--accent); color: #fff; }

    .new-room-row { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
    .new-room-row input { margin: 0; font-size: 12px; padding: 7px 10px; }
    .new-room-row button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .presence-section { padding: 10px 14px; border-top: 1px solid var(--border); }
    .presence-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .presence-user { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 4px 0; color: var(--muted); }
    .presence-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    /* ── Chat panel ── */
    .chat-panel { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .chat-header-title { font-size: 15px; font-weight: 600; }
    .conn-status { font-size: 11px; padding: 3px 9px; border-radius: 20px; }
    .conn-status.connected { background: rgba(62,207,142,0.15); color: var(--green); }
    .conn-status.disconnected { background: rgba(239,68,68,0.15); color: var(--red); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { max-width: 60%; }
    .msg.mine { align-self: flex-end; }
    .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .msg.mine .msg-meta { text-align: right; }
    .msg-bubble {
      background: var(--surface2);
      border-radius: 12px;
      padding: 9px 14px;
      font-size: 14px;
      word-wrap: break-word;
    }
    .msg.mine .msg-bubble { background: var(--accent); color: #fff; }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }
    .composer input {
      flex: 1;
      margin: 0;
    }
    .composer button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .composer button:hover { background: var(--accent-hover); }

    .empty-msgs { text-align: center; color: var(--muted); font-size: 13px; margin-top: 40px; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-text">Pulse<span>Chat</span></div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">Log in</div>
      <div class="auth-tab" id="tab-register" onclick="setAuthTab('register')">Register</div>
    </div>
    <label>Username</label>
    <input type="text" id="auth-username" placeholder="victor" />
    <label>Password</label>
    <input type="password" id="auth-password" placeholder="••••••••" />
    <button class="auth-btn" onclick="submitAuth()" id="auth-submit-btn">Log in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Pulse<span style="color:var(--accent)">Chat</span></div>
        <div class="me-badge" id="me-badge"></div>
      </div>
      <div class="room-list" id="room-list"></div>
      <div class="new-room-row">
        <input type="text" id="new-room-name" placeholder="New room..." maxlength="40" />
        <button onclick="createRoom()">+</button>
      </div>
      <div class="presence-section">
        <div class="presence-title">Online now</div>
        <div id="presence-list"></div>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-title" id="current-room-name">Select a room</div>
        <div class="conn-status disconnected" id="conn-status">Disconnected</div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input type="text" id="msg-input" placeholder="Type a message..." maxlength="2000" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = '/api';
  let authMode = 'login';
  let token = null;
  let me = null;
  let rooms = [];
  let currentRoom = null;
  let ws = null;
  let presencePollTimer = null;

  function setAuthTab(mode) {
    authMode = mode;
    document.getElementById('tab-login').classList.toggle('active', mode === 'login');
    document.getElementById('tab-register').classList.toggle('active', mode === 'register');
    document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Log in' : 'Create account';
    document.getElementById('auth-error').textContent = '';
  }

  async function submitAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!username || !password) {
      errEl.textContent = 'Username and password are required';
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/auth/${authMode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'Something went wrong';
        return;
      }
      token = data.token;
      me = data.user;
      enterChat();
    } catch (e) {
      errEl.textContent = 'Network error — is the API reachable?';
    }
  }

  function enterChat() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'block';
    document.getElementById('me-badge').textContent = `@${me.username}`;
    loadRooms();
    pollPresence();
    presencePollTimer = setInterval(pollPresence, 8000);
  }

  async function loadRooms() {
    const res = await fetch(`${API_BASE}/rooms`);
    rooms = await res.json();
    renderRooms();
    if (rooms.length > 0 && !currentRoom) {
      selectRoom(rooms[0]);
    }
  }

  function renderRooms() {
    const list = document.getElementById('room-list');
    list.innerHTML = rooms.map(r => `
      <div class="room-item ${currentRoom && currentRoom.id === r.id ? 'active' : ''}" onclick='selectRoom(${JSON.stringify(r)})'>
        # ${escHtml(r.name)}
      </div>
    `).join('');
  }

  async function createRoom() {
    const input = document.getElementById('new-room-name');
    const name = input.value.trim();
    if (!name) return;
    const res = await fetch(`${API_BASE}/rooms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name }),
    });
    if (res.ok) {
      input.value = '';
      await loadRooms();
    }
  }

  async function selectRoom(room) {
    currentRoom = room;
    document.getElementById('current-room-name').textContent = `# ${room.name}`;
    renderRooms();
    await loadMessages(room.id);
    connectWebSocket();
  }

  async function loadMessages(roomId) {
    const res = await fetch(`${API_BASE}/rooms/${roomId}/messages`);
    const messages = await res.json();
    renderMessages(messages);
  }

  function renderMessages(messages) {
    const container = document.getElementById('messages');
    if (messages.length === 0) {
      container.innerHTML = '<div class="empty-msgs">No messages yet — say hello 👋</div>';
      return;
    }
    container.innerHTML = messages.map(renderMessageHtml).join('');
    container.scrollTop = container.scrollHeight;
  }

  function renderMessageHtml(msg) {
    const mine = msg.username === me.username;
    return `
      <div class="msg ${mine ? 'mine' : ''}">
        <div class="msg-meta">${mine ? 'You' : escHtml(msg.username)}</div>
        <div class="msg-bubble">${escHtml(msg.content)}</div>
      </div>
    `;
  }

  function appendMessage(msg) {
    const container = document.getElementById('messages');
    const empty = container.querySelector('.empty-msgs');
    if (empty) empty.remove();
    container.insertAdjacentHTML('beforeend', renderMessageHtml(msg));
    container.scrollTop = container.scrollHeight;
  }

  function connectWebSocket() {
    if (ws) ws.close();
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws?token=${token}`);

    ws.onopen = () => setConnStatus(true);
    ws.onclose = () => setConnStatus(false);
    ws.onerror = () => setConnStatus(false);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'message' && currentRoom && data.roomId === currentRoom.id) {
        appendMessage(data);
      }
    };
  }

  function setConnStatus(connected) {
    const el = document.getElementById('conn-status');
    el.textContent = connected ? 'Connected' : 'Disconnected';
    el.className = `conn-status ${connected ? 'connected' : 'disconnected'}`;
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !currentRoom || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'message', roomId: currentRoom.id, content }));
    input.value = '';
  }

  async function pollPresence() {
    try {
      const res = await fetch('/presence');
      const online = await res.json();
      renderPresence(online);
    } catch (e) {
      // presence service may be temporarily unavailable — fail quietly
    }
  }

  function renderPresence(users) {
    const list = document.getElementById('presence-list');
    if (users.length === 0) {
      list.innerHTML = '<div class="presence-user" style="opacity:0.5">No one online</div>';
      return;
    }
    list.innerHTML = users.map(u => `
      <div class="presence-user">
        <div class="presence-dot"></div>
        ${escHtml(u.username)}
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAuth();
  });
  document.getElementById('new-room-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') createRoom();
  });
</script>
</body>
</html>
